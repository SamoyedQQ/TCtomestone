name: Backfill & Fix-Forward rDPS

# 單一機制同時達成兩個目的（見 backfill_rdps.py）：
#   1. 歷史回填：把早期在 FFLogs 尚未 ranking 時抓取、分母退回 totalTime 而偏低的舊 rDPS
#      逐批改用 rankings.duration 重算。進度存於 docs/data/backfill_state.json，
#      跨多個整點分批完成（受 FFLogs 3600pt/hr 限制，全量約需十餘批），完成後自動 no-op。
#   2. fix-forward：報告只有在「所有通關場次皆已 ranked」時才標記完成；尚未 ranked 的
#      （含每日爬蟲新寫入的通關）會保留待下批重抓，待 FFLogs 完成 ranking 後即自動校正。
on:
  schedule:
    - cron: '5 * * * *'    # 每小時 :05 觸發（避開每日 02:00 主爬蟲）
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-data        # 與主爬蟲共用，序列化以避免 git 競態
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Backfill batch
        env:
          FFLOGS_CLIENT_ID: ${{ secrets.FFLOGS_CLIENT_ID }}
          FFLOGS_CLIENT_SECRET: ${{ secrets.FFLOGS_CLIENT_SECRET }}
        run: |
          set +e
          python backfill_rdps.py
          code=$?
          # exit 75 = 預算用盡的正常暫停，不視為失敗
          if [ $code -ne 0 ] && [ $code -ne 75 ]; then exit $code; fi

      # 只提交來源檔（player_bests + 進度），leaderboard 在「pull 之後」才重建，
      # 避免兩個 workflow 同時改生成檔造成 git merge 衝突（先前 CI 失敗主因）。
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/player_bests.json docs/data/backfill_state.json
          if git diff --cached --quiet; then
            echo "本批無資料變更"; exit 0
          fi
          git commit -m "data: backfill rDPS $(date -u '+%Y-%m-%d %H:%M UTC')"
          for attempt in 1 2 3 4 5; do
            # 先同步遠端來源檔（player_bests 通常可自動合併；極少數衝突偏向遠端，
            # 由下批冪等 update_if_better 重做，不會遺失校正）
            git pull --no-rebase --no-edit -X theirs origin master || true
            # 從合併後的 player_bests 重建 leaderboards，確保生成檔與來源一致且不衝突
            python -c "from headless_run import _write_split_data; from pathlib import Path; _write_split_data(Path('docs/data'))"
            git add docs/data/
            git commit -m "data: rebuild leaderboards" --no-edit || true
            if git push; then echo "已推送（attempt $attempt）"; exit 0; fi
            echo "push 被拒，遠端有更新，重試 $attempt ..."
          done
          echo "push 重試 5 次仍失敗"; exit 1
