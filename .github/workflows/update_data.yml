name: Update TC Data

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 02:00 UTC（台灣時間 10:00）
  workflow_dispatch:        # 允許從 GitHub Actions 頁面手動觸發

permissions:
  contents: write           # 允許 bot 提交並推送資料更新

concurrency:
  group: update-data
  cancel-in-progress: false  # 排隊等候，不取消進行中的執行

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run scraper
        env:
          FFLOGS_CLIENT_ID: ${{ secrets.FFLOGS_CLIENT_ID }}
          FFLOGS_CLIENT_SECRET: ${{ secrets.FFLOGS_CLIENT_SECRET }}
        run: python headless_run.py

      - name: Validate data
        run: python validate_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/ config/fflogs.json
          if ! git diff --cached --quiet; then
            echo "{\"updated_at\":\"$(TZ='Asia/Taipei' date '+%Y-%m-%d %H:%M')\"}" > docs/data/meta.json
            git add docs/data/meta.json
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git pull --no-rebase origin master &&
            git push
          fi
