name: Update TC Data

on:
  schedule:
    - cron: '0 2 * * *'   # 每天 02:00 UTC (= 台灣時間 10:00)
  workflow_dispatch:        # 允許手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Restore source files
        env:
          SCRAPER_CORE_B64: ${{ secrets.SCRAPER_CORE_B64 }}
          HEADLESS_RUN_B64: ${{ secrets.HEADLESS_RUN_B64 }}
        run: |
          python3 -c "import base64,os; open('scraper_core.py','wb').write(base64.b64decode(os.environ['SCRAPER_CORE_B64']))"
          python3 -c "import base64,os; open('headless_run.py','wb').write(base64.b64decode(os.environ['HEADLESS_RUN_B64']))"

      - name: Run scraper
        env:
          FFLOGS_CLIENT_ID: ${{ secrets.FFLOGS_CLIENT_ID }}
          FFLOGS_CLIENT_SECRET: ${{ secrets.FFLOGS_CLIENT_SECRET }}
        run: python headless_run.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/
          git diff --cached --quiet || (
            git commit -m "data: auto-update $(date -u '+%Y-%m-%d %H:%M UTC')" &&
            git pull --rebase origin master &&
            git push
          )
